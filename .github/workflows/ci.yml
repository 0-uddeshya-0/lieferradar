name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lieferradar
          POSTGRES_USER: lieferradar
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lieferradar -d lieferradar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://lieferradar:password@localhost:5432/lieferradar
      JWT_SECRET: ci-jwt-secret-minimum-32-characters-long
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN_DAYS: 30
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: false
      SMTP_USER: ""
      SMTP_PASS: ""
      EMAIL_FROM_NAME: LieferRadar
      EMAIL_FROM_ADDRESS: test@lieferradar.local
      API_URL: http://localhost:3001
      WEB_URL: http://localhost:5173
      NODE_ENV: test
      REMINDER_CRON: "0 * * * *"
      DIGEST_CRON: "0 8 * * 1"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm db:migrate:deploy

      - name: Build shared package
        run: pnpm --filter @lieferradar/shared build

      - name: Run tests
        run: pnpm test

      - name: Build API
        run: pnpm --filter @lieferradar/api build

      - name: Build web
        run: pnpm --filter @lieferradar/web build

      - name: Build MCP server
        run: pnpm --filter @lieferradar/mcp build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @lieferradar/shared build

      - name: Install Playwright Chromium
        run: pnpm --filter @lieferradar/web exec playwright install --with-deps chromium

      - name: Run e2e tests (demo build)
        run: pnpm --filter @lieferradar/web test:e2e
